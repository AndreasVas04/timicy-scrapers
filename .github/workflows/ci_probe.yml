# ---------------------------------------------------------------------------
# ci_probe.yml — THROWAWAY diagnostic workflow (safe to delete after use)
#
# Purpose:
#   Test whether search-engine crawler User-Agents (Googlebot, Bingbot)
#   bypass Cloudflare on stephanis.com.cy.  Many sites whitelist Googlebot
#   by UA string for SEO (JSON-LD rich results, sitemap access) without
#   enabling Cloudflare's reverse-DNS verified-bot validation — especially
#   on small / free Cloudflare plans.
#
# Hypothesis:
#   stephanis is an SSR site serving JSON-LD product data for Google rich
#   results.  If Cloudflare only checks the User-Agent string (not the
#   reverse-DNS origin of the request), a Googlebot UA from a datacenter
#   IP should pass the challenge.
#
# What this workflow does NOT do:
#   - does NOT run any scraper
#   - does NOT touch the database
#   - does NOT use any repository secret or proxy
#   - does NOT import or modify any existing repo code
#   - does NOT send sec-ch-ua or Sec-Fetch-* headers (real crawlers never
#     send these — sending them would contradict the crawler UA and could
#     trigger Cloudflare's header-mismatch detection)
#
# It is a read-only network probe whose results are printed to the job log.
# ---------------------------------------------------------------------------
name: CI Probe (stephanis Googlebot/Bingbot UA bypass)

on:
  # Manual trigger only — never runs on push or on a schedule.
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Probe stephanis with crawler User-Agents
        shell: bash
        run: |
          set +e +o pipefail

          # =================================================================
          # Configuration
          # =================================================================

          # The two target URLs to probe.
          PRODUCT_URL="https://www.stephanis.com.cy/en/products/410161"
          SITEMAP_URL="https://www.stephanis.com.cy/sitemap.xml"

          # Accept headers that real crawlers send (no sec-ch-ua, no
          # Sec-Fetch-* — those are browser-only and would contradict
          # the crawler UA, potentially triggering mismatch detection).
          ACCEPT_HEADERS=(
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
            -H 'Accept-Encoding: gzip, deflate, br'
          )

          # --- Show the runner's public IP (confirms datacenter, no proxy) ---
          echo "============================================================"
          echo "=== Runner Public IP ==="
          echo "============================================================"
          RUNNER_IP=$(curl -s --max-time 10 https://api.ipify.org || echo "unknown")
          echo "Public IP: $RUNNER_IP"
          echo "(GitHub Actions datacenter IP — no proxy is used)"
          echo ""

          # =================================================================
          # probe_url — fetches a URL, prints diagnostics + verdict
          #
          # Arguments:
          #   $1 — human-readable label for this probe
          #   $2 — target URL
          #   $3 — User-Agent string
          # =================================================================
          probe_url() {
            local LABEL="$1"
            local URL="$2"
            local UA="$3"

            echo "============================================================"
            echo "=== $LABEL ==="
            echo "URL: $URL"
            echo "UA:  $UA"
            echo "============================================================"

            # Fetch headers into one file, body into another.
            local HDR_FILE BODY_FILE HTTP_CODE
            HDR_FILE=$(mktemp)
            BODY_FILE=$(mktemp)

            HTTP_CODE=$(curl -s -D "$HDR_FILE" -o "$BODY_FILE" \
              --max-time 20 --compressed \
              -H "User-Agent: $UA" \
              "${ACCEPT_HEADERS[@]}" \
              -w '%{http_code}' \
              "$URL" 2>/dev/null)

            # --- Print HTTP status ---
            echo "HTTP status:   $HTTP_CODE"

            # --- Extract key response headers ---
            local SERVER CF_MITIGATED
            SERVER=$(grep -i '^server:' "$HDR_FILE" | head -1 | sed 's/^[^:]*: //' | tr -d '\r')
            CF_MITIGATED=$(grep -i '^cf-mitigated:' "$HDR_FILE" | head -1 | sed 's/^[^:]*: //' | tr -d '\r')

            echo "server:        ${SERVER:-(not present)}"
            echo "cf-mitigated:  ${CF_MITIGATED:-(not present)}"

            # --- Body preview: first 200 characters ---
            local BODY_PREVIEW
            BODY_PREVIEW=$(head -c 200 "$BODY_FILE" 2>/dev/null)
            echo ""
            echo "Body (first 200 chars):"
            echo "$BODY_PREVIEW"
            echo ""

            # --- Verdict ---
            local BODY_FULL VERDICT
            BODY_FULL=$(cat "$BODY_FILE" 2>/dev/null)

            if [[ -n "$CF_MITIGATED" ]]; then
              # cf-mitigated header is present → Cloudflare actively blocked.
              VERDICT="CHALLENGED (cf-mitigated header present)"
            elif echo "$BODY_FULL" | grep -qi "Just a moment"; then
              # Cloudflare challenge page detected in body.
              VERDICT="CHALLENGED (body contains 'Just a moment')"
            elif [[ "$HTTP_CODE" == "200" ]]; then
              # Status 200 — check for real content indicators.
              if echo "$BODY_FULL" | grep -q '<?xml'; then
                VERDICT="CLEAN — passed (body contains '<?xml')"
              elif echo "$BODY_FULL" | grep -q 'application/ld+json'; then
                VERDICT="CLEAN — passed (body contains 'application/ld+json')"
              elif echo "$BODY_FULL" | grep -q 'productID'; then
                VERDICT="CLEAN — passed (body contains 'productID')"
              else
                VERDICT="CLEAN — passed (status 200, no challenge markers)"
              fi
            else
              VERDICT="UNCLEAR — HTTP $HTTP_CODE, inspect body above"
            fi

            echo ">>> VERDICT: $VERDICT"
            echo ""

            # Store verdict for the summary table at the end.
            VERDICTS+=("$LABEL | $VERDICT")

            rm -f "$HDR_FILE" "$BODY_FILE"
          }

          # =================================================================
          # Array to collect verdicts for the summary table.
          # =================================================================
          VERDICTS=()

          # =================================================================
          # User-Agent strings for the three crawler variants.
          # =================================================================

          # Googlebot desktop — the standard Googlebot crawler UA.
          UA_GOOGLEBOT_DESKTOP="Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"

          # Googlebot smartphone — mobile-first indexing variant.
          UA_GOOGLEBOT_MOBILE="Mozilla/5.0 (Linux; Android 6.0.1; Nexus 5X Build/MMB29P) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.6613.84 Mobile Safari/537.36 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"

          # Bingbot — Microsoft's search crawler.
          UA_BINGBOT="Mozilla/5.0 (compatible; bingbot/2.0; +http://www.bing.com/bingbot.htm)"

          # =================================================================
          # Probes: 3 UAs × 2 URLs = 6 probes
          # =================================================================

          # --- Googlebot desktop ---
          probe_url "Googlebot desktop → product page" \
            "$PRODUCT_URL" \
            "$UA_GOOGLEBOT_DESKTOP"

          probe_url "Googlebot desktop → sitemap" \
            "$SITEMAP_URL" \
            "$UA_GOOGLEBOT_DESKTOP"

          # --- Googlebot smartphone ---
          probe_url "Googlebot smartphone → product page" \
            "$PRODUCT_URL" \
            "$UA_GOOGLEBOT_MOBILE"

          probe_url "Googlebot smartphone → sitemap" \
            "$SITEMAP_URL" \
            "$UA_GOOGLEBOT_MOBILE"

          # --- Bingbot ---
          probe_url "Bingbot → product page" \
            "$PRODUCT_URL" \
            "$UA_BINGBOT"

          probe_url "Bingbot → sitemap" \
            "$SITEMAP_URL" \
            "$UA_BINGBOT"

          # =================================================================
          # Summary table — one line per probe with its verdict.
          # =================================================================
          echo "============================================================"
          echo "=== SUMMARY ==="
          echo "============================================================"
          echo ""
          for v in "${VERDICTS[@]}"; do
            echo "  $v"
          done
          echo ""
          echo "============================================================"
          echo "=== DONE ==="
          echo "============================================================"
