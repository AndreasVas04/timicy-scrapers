# ---------------------------------------------------------------------------
# ci_probe.yml — THROWAWAY diagnostic workflow (safe to delete after use)
#
# Purpose:
#   Probe whether non-www hosts / subdomains of stephanis.com.cy bypass
#   Cloudflare.  Many small sites only protect www — if the apex domain
#   or a subdomain (api, assets, cdn) serves the same content without a
#   CF challenge, the scraper can hit it directly from the datacenter IP.
#
# Also checks DNS resolution (Cloudflare IPs vs origin) and queries the
# Wayback Machine availability API for an archived sitemap snapshot.
#
# What this workflow does NOT do:
#   - does NOT run any scraper
#   - does NOT touch the database
#   - does NOT use any repository secret or proxy
#   - does NOT import or modify any existing repo code
#
# It is a read-only network probe whose results are printed to the job log.
# ---------------------------------------------------------------------------
name: CI Probe (stephanis host/subdomain Cloudflare bypass)

on:
  # Manual trigger only — never runs on push or on a schedule.
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Probe stephanis hosts and subdomains
        shell: bash
        run: |
          set +e +o pipefail

          # --- Common browser headers used on every request ---
          BROWSER_HEADERS=(
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8'
            -H 'Accept-Language: el-CY,el;q=0.9,en;q=0.8'
            -H 'Accept-Encoding: gzip, deflate, br'
            -H 'sec-ch-ua: "Chromium";v="124", "Not.A/Brand";v="24"'
            -H 'sec-ch-ua-mobile: ?0'
            -H 'sec-ch-ua-platform: "Windows"'
            -H 'Sec-Fetch-Dest: document'
            -H 'Sec-Fetch-Mode: navigate'
            -H 'Sec-Fetch-Site: none'
            -H 'Upgrade-Insecure-Requests: 1'
          )

          # --- Show the runner's public IP (confirms datacenter, no proxy) ---
          echo "============================================================"
          echo "=== Runner Public IP ==="
          echo "============================================================"
          RUNNER_IP=$(curl -s --max-time 10 https://api.ipify.org || echo "unknown")
          echo "Public IP: $RUNNER_IP"
          echo "(GitHub Actions datacenter IP — no proxy is used)"
          echo ""

          # =================================================================
          # SECTION 1 — DNS resolution check
          #   Cloudflare proxied domains resolve to 104.x / 172.x ranges.
          #   An origin IP (e.g. a hosting provider) means no CF proxy.
          # =================================================================
          echo "============================================================"
          echo "=== DNS Resolution ==="
          echo "============================================================"
          echo ""
          echo "--- dig +short stephanis.com.cy (apex) ---"
          dig +short stephanis.com.cy || echo "(dig failed)"
          echo ""
          echo "--- dig +short www.stephanis.com.cy ---"
          dig +short www.stephanis.com.cy || echo "(dig failed)"
          echo ""

          # =================================================================
          # SECTION 2 — Main URL probes (full browser headers, GET)
          #   For each URL: print status, server header, cf-mitigated header,
          #   first 200 chars of body, and a verdict line.
          # =================================================================

          probe_url() {
            # $1 = label, $2 = URL
            local LABEL="$1"
            local URL="$2"

            echo "============================================================"
            echo "=== $LABEL ==="
            echo "URL: $URL"
            echo "============================================================"

            # Fetch into a temp file so we can inspect headers + body separately.
            local TMPFILE
            TMPFILE=$(mktemp)

            local HTTP_CODE
            HTTP_CODE=$(curl -s -o "$TMPFILE" -D - \
              --max-time 20 --compressed \
              "${BROWSER_HEADERS[@]}" \
              -w '\n%{http_code}' \
              "$URL" 2>/dev/null)

            # The last line of output is the HTTP status code (-w format).
            # Everything before it is the response headers + body in $TMPFILE.
            # curl -D - writes headers to stdout; -o writes body to file.
            # We re-do this more cleanly: headers to one file, body to another.
            rm -f "$TMPFILE"

            local HDR_FILE BODY_FILE
            HDR_FILE=$(mktemp)
            BODY_FILE=$(mktemp)

            HTTP_CODE=$(curl -s -D "$HDR_FILE" -o "$BODY_FILE" \
              --max-time 20 --compressed \
              "${BROWSER_HEADERS[@]}" \
              -w '%{http_code}' \
              "$URL" 2>/dev/null)

            echo "HTTP status:   $HTTP_CODE"

            # Extract key headers.
            local SERVER CF_MITIGATED
            SERVER=$(grep -i '^server:' "$HDR_FILE" | head -1 | sed 's/^[^:]*: //' | tr -d '\r')
            CF_MITIGATED=$(grep -i '^cf-mitigated:' "$HDR_FILE" | head -1 | sed 's/^[^:]*: //' | tr -d '\r')

            echo "server:        ${SERVER:-(not present)}"
            echo "cf-mitigated:  ${CF_MITIGATED:-(not present)}"

            # Body preview — first 200 chars.
            local BODY_PREVIEW
            BODY_PREVIEW=$(head -c 200 "$BODY_FILE" 2>/dev/null)
            echo ""
            echo "Body (first 200 chars):"
            echo "$BODY_PREVIEW"
            echo ""

            # --- Verdict ---
            local BODY_FULL
            BODY_FULL=$(cat "$BODY_FILE" 2>/dev/null)

            if [[ -n "$CF_MITIGATED" ]]; then
              echo ">>> VERDICT: CLOUDFLARE CHALLENGE (cf-mitigated header present)"
            elif echo "$BODY_FULL" | grep -q "Just a moment"; then
              echo ">>> VERDICT: CLOUDFLARE CHALLENGE (body contains 'Just a moment')"
            elif [[ "$HTTP_CODE" == "200" ]]; then
              echo ">>> VERDICT: CLEAN (no Cloudflare block)"
            else
              echo ">>> VERDICT: UNCLEAR — status $HTTP_CODE, inspect body above"
            fi

            echo ""
            rm -f "$HDR_FILE" "$BODY_FILE"
          }

          # Probe 1 — www sitemap (known-blocked baseline)
          probe_url "Probe 1: www sitemap (known-blocked baseline)" \
            "https://www.stephanis.com.cy/sitemap.xml"

          # Probe 2 — apex domain sitemap (no www)
          probe_url "Probe 2: apex domain sitemap (no www)" \
            "https://stephanis.com.cy/sitemap.xml"

          # Probe 3 — www product page (real product from data dump)
          probe_url "Probe 3: www product page" \
            "https://www.stephanis.com.cy/en/products/410161"

          # Probe 4 — apex product page (same product, no www)
          probe_url "Probe 4: apex product page (no www)" \
            "https://stephanis.com.cy/en/products/410161"

          # =================================================================
          # SECTION 3 — Subdomain probes (api, assets, cdn)
          #   These may not exist — wrap each so DNS failure prints a clean
          #   line instead of aborting.
          # =================================================================
          echo "============================================================"
          echo "=== Subdomain probes (api / assets / cdn) ==="
          echo "============================================================"
          echo ""

          probe_subdomain() {
            # $1 = URL
            local URL="$1"
            local HOST
            HOST=$(echo "$URL" | sed 's|https://||' | cut -d/ -f1)

            # Check if the host resolves at all.
            if ! dig +short "$HOST" 2>/dev/null | grep -q .; then
              echo "$URL — (no such host)"
              return
            fi

            local HDR_FILE BODY_FILE HTTP_CODE
            HDR_FILE=$(mktemp)
            BODY_FILE=$(mktemp)

            HTTP_CODE=$(curl -s -D "$HDR_FILE" -o "$BODY_FILE" \
              --max-time 10 --compressed \
              "${BROWSER_HEADERS[@]}" \
              -w '%{http_code}' \
              "$URL" 2>/dev/null)

            local SERVER
            SERVER=$(grep -i '^server:' "$HDR_FILE" | head -1 | sed 's/^[^:]*: //' | tr -d '\r')

            echo "$URL — status: $HTTP_CODE, server: ${SERVER:-(none)} (resolves)"
            rm -f "$HDR_FILE" "$BODY_FILE"
          }

          probe_subdomain "https://api.stephanis.com.cy"
          probe_subdomain "https://assets.stephanis.com.cy"
          probe_subdomain "https://cdn.stephanis.com.cy"
          echo ""

          # =================================================================
          # SECTION 4 — Wayback Machine availability API
          #   archive.org is never Cloudflare-blocked. If a recent snapshot
          #   of the sitemap exists, we can parse it for product URLs without
          #   ever hitting stephanis directly.
          # =================================================================
          echo "============================================================"
          echo "=== Wayback Machine availability API ==="
          echo "============================================================"
          echo ""
          echo "Checking if an archived snapshot of the sitemap exists..."
          echo ""
          WAYBACK_JSON=$(curl -s --max-time 20 \
            "https://archive.org/wayback/available?url=www.stephanis.com.cy/sitemap.xml")
          echo "Raw JSON response:"
          echo "$WAYBACK_JSON"
          echo ""

          echo "============================================================"
          echo "=== DONE ==="
          echo "============================================================"
