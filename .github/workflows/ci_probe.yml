# ---------------------------------------------------------------------------
# ci_probe.yml — THROWAWAY diagnostic workflow (safe to delete after use)
#
# Purpose:
#   Test whether curl_cffi's browser TLS impersonation (chrome124 JA3
#   fingerprint) can bypass the Cloudflare challenge on stephanis.com.cy
#   WITHOUT any proxy, from a GitHub Actions datacenter IP.
#
#   Hypothesis: the cf-mitigated: challenge response seen from datacenter
#   IPs is triggered by the TLS/JA3 fingerprint of standard HTTP clients
#   (requests, urllib, plain curl), not purely by IP reputation.  If so,
#   a client that presents a real-browser TLS fingerprint should get 200.
#
# What this workflow does NOT do:
#   - does NOT run any scraper
#   - does NOT touch the database
#   - does NOT use any repository secret or proxy
#   - does NOT import or modify any existing repo code
#
# It is a read-only network probe whose results are printed to the job log.
# ---------------------------------------------------------------------------
name: CI Probe (curl_cffi TLS fingerprint vs Cloudflare)

on:
  # Manual trigger only — never runs on push or on a schedule.
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install curl_cffi
        shell: bash
        run: pip install curl_cffi --break-system-packages

      - name: Probe stephanis with curl_cffi browser TLS impersonation
        shell: bash
        run: |
          python3 << 'PYEOF'
          import sys

          # -- Show runner public IP so the log confirms this is a datacenter IP --
          import subprocess
          try:
              ip = subprocess.run(
                  ["curl", "-s", "--max-time", "15", "https://api.ipify.org"],
                  capture_output=True, text=True, timeout=20
              ).stdout.strip()
              print(f"Runner public IP: {ip}")
          except Exception as e:
              print(f"Could not fetch public IP: {e}")
              ip = "unknown"
          print("NOTE: this is a GitHub Actions datacenter IP — no proxy is used.\n")

          from curl_cffi import requests as cffi_requests

          TARGET = "https://www.stephanis.com.cy/sitemap.xml"

          # Full browser header set — same headers the previous bash probe used.
          BROWSER_HEADERS = {
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              "Accept-Language": "el-CY,el;q=0.9,en;q=0.8",
              "Accept-Encoding": "gzip, deflate, br",
              "sec-ch-ua": '"Chromium";v="124", "Not.A/Brand";v="24"',
              "sec-ch-ua-mobile": "?0",
              "sec-ch-ua-platform": '"Windows"',
              "Sec-Fetch-Dest": "document",
              "Sec-Fetch-Mode": "navigate",
              "Sec-Fetch-Site": "none",
              "Upgrade-Insecure-Requests": "1",
          }


          def classify(status_code, headers, body_preview):
              """Return a one-line verdict string."""
              cf_mitigated = headers.get("cf-mitigated", "")
              if status_code == 200 and body_preview.lstrip().startswith("<?xml"):
                  return "PASS: bypassed without proxy"
              if cf_mitigated:
                  return f"STILL CHALLENGED (cf-mitigated: {cf_mitigated})"
              if "challenges.cloudflare.com" in body_preview or "Just a moment" in body_preview:
                  return "STILL CHALLENGED (challenge HTML in body)"
              return f"UNCLEAR — status {status_code}, inspect body preview above"


          def run_probe(label, url, extra_headers=None):
              """Send a GET via curl_cffi with chrome TLS impersonation."""
              print(f"\n{'='*60}")
              print(f"=== {label} ===")
              print(f"URL: {url}")
              print(f"Impersonation: chrome124 (browser TLS fingerprint)")
              if extra_headers:
                  print(f"Extra headers: YES (full browser header set)")
              else:
                  print(f"Extra headers: NO (only curl_cffi defaults)")
              print(f"Proxy: NONE")
              print(f"{'='*60}")

              try:
                  resp = cffi_requests.get(
                      url,
                      impersonate="chrome124",
                      headers=extra_headers or {},
                      timeout=30,
                  )
              except Exception as e:
                  print(f"REQUEST FAILED: {type(e).__name__}: {e}")
                  return "ERR", str(e)

              status = resp.status_code
              hdrs = dict(resp.headers)

              print(f"\nHTTP status: {status}")

              # Print key response headers.
              for hdr_name in ("server", "cf-mitigated", "cf-ray", "content-type"):
                  val = hdrs.get(hdr_name, "(not present)")
                  print(f"  {hdr_name}: {val}")

              # Body preview — first 300 chars.
              body = resp.text[:300] if resp.text else "(empty body)"
              print(f"\nBody preview (first 300 chars):\n{body}")

              verdict = classify(status, hdrs, resp.text or "")
              print(f"\nVerdict: {verdict}")

              return status, verdict


          # ---------------------------------------------------------------
          # Probe 1 — curl_cffi with chrome124 TLS impersonation, NO extra
          #           headers (only the defaults curl_cffi sets internally).
          # ---------------------------------------------------------------
          status1, verdict1 = run_probe(
              "Probe 1: curl_cffi chrome124 — TLS only, no custom headers",
              TARGET,
              extra_headers=None,
          )

          # ---------------------------------------------------------------
          # Probe 2 — curl_cffi with chrome124 TLS impersonation PLUS the
          #           full browser header set (Accept, sec-ch-ua, etc.).
          #           Tests whether headers + TLS together matter.
          # ---------------------------------------------------------------
          status2, verdict2 = run_probe(
              "Probe 2: curl_cffi chrome124 — TLS + full browser headers",
              TARGET,
              extra_headers=BROWSER_HEADERS,
          )

          # ---------------------------------------------------------------
          # Final summary — easy to grep from the job log.
          # ---------------------------------------------------------------
          print("\n" + "="*60)
          print("=== SUMMARY ===")
          print(f"RESULT stephanis curl_cffi no-proxy: {status1}")
          print(f"RESULT stephanis curl_cffi + headers: {status2}")
          print(f"  Verdict (TLS only):          {verdict1}")
          print(f"  Verdict (TLS + headers):     {verdict2}")
          print("="*60)
          PYEOF
